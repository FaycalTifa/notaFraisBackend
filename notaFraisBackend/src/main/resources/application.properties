spring.application.name=notaFraisBackend
spring.datasource.url=jdbc:postgresql://localhost:5432/NOTAFRAIS
spring.datasource.username=notafrais
spring.datasource.password=notafrais
spring.jpa.database=POSTGRESQL
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.auto=update


spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

server.port=8080

# Configuration JWT
app.jwt.secret=MaSuperCleSecretePourJWTDoitEtreLongueEtComplexe123456789012345678901234567890
app.jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.notaFraisBackend=DEBUG

# Logs pour voir l'initialisation
logging.level.com.example.notaFraisBackend.config.DataInitializer=DEBUG
